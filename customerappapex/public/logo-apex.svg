<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Apex Chem Triangle Logo -->
  <g transform="translate(2, 2)">
    <!-- Outer circle arc (blue-grey) -->
    <path d="M18 0 A18 18 0 0 1 36 18" stroke="#4a6fa5" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M36 18 A18 18 0 0 1 18 36" stroke="#6b7b8d" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M18 36 A18 18 0 0 1 0 18" stroke="#4a6fa5" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 18 A18 18 0 0 1 18 0" stroke="#6b7b8d" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Red triangle / arrow pointing up-right -->
    <polygon points="18,6 30,28 12,28" fill="#e63329"/>
    <!-- Inner white cut -->
    <polygon points="18,14 24,24 15,24" fill="white" opacity="0.3"/>
  </g>
  <!-- Company name -->
  <text x="46" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="0.5">APEX</text>
  <text x="46" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#a1a1aa" letter-spacing="1.5">CHEM</text>
</svg>