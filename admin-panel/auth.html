<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Apex Collector</title>
    <link rel="stylesheet" href="global.css">
    <!-- Icons: Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d174'><path d='M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z'/></svg>">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Services -->
    <script src="supabase-config.js"></script>
    <script src="auth-service.js"></script>
    
    <style>
        .auth-container {
            min-height: 100vh;
            background: #0f1117;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .auth-card {
            background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.12);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .auth-header {
            background: var(--primary-color);
            color: white;
            padding: 24px 20px 18px;
            text-align: center;
            position: relative;
        }

        .auth-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #00b369;
        }

        .auth-logo {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-logo .icon {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .auth-subtitle {
            opacity: 0.95;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .auth-form {
            padding: 28px 20px 20px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
            color: #f4f4f5;
            box-sizing: border-box;
        }

        .form-group input::placeholder {
            color: #71717a;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 209, 116, 0.08);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            margin-top: 16px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .auth-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .auth-button:hover:not(:disabled) {
            background: #00b369;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 209, 116, 0.25);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: var(--text-secondary);
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .auth-divider span {
            background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
            padding: 0 15px;
            font-size: 14px;
        }

        .social-buttons {
            display: grid;
            gap: 10px;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 14px;
            cursor: pointer;
        }

        .social-button:hover {
            border-color: var(--primary-color);
            background: #f8fafc;
        }

        .social-button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #c3e6cb;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            z-index: 100;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            background: rgba(0, 0, 0, 0.2);
            color: white;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 12px;
                align-items: flex-start;
                padding-top: 60px;
            }
            
            .auth-card {
                max-width: 100%;
                border-radius: 20px;
            }
            
            .auth-form {
                padding: 24px 18px 18px;
            }
            
            .auth-header {
                padding: 20px 18px 16px;
            }
            
            .back-link {
                position: absolute;
                top: 12px;
                left: 12px;
                margin: 0;
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <a href="admin.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Admin
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                    </svg>
                    Admin Portal
                </div>
                <div class="auth-subtitle">Apex Collector Administration</div>
            </div>
            
            <div class="auth-form">
                <!-- Error/Success Messages -->
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <!-- Sign In Form -->
                <form onsubmit="handleSignIn(event)">
                    <div class="form-group">
                        <label for="signinEmail">Email Address</label>
                        <input type="email" id="signinEmail" required placeholder="Enter your admin email">
                    </div>
                    
                    <div class="form-group">
                        <label for="signinPassword">Password</label>
                        <input type="password" id="signinPassword" required placeholder="Enter your password">
                        <span class="password-toggle" onclick="togglePassword('signinPassword')">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </span>
                    </div>
                    
                    <button type="submit" class="auth-button" id="signinButton">
                        <span class="button-text">Sign In to Admin</span>
                    </button>
                </form>
                
                <div class="forgot-password">
                    <a href="#" onclick="showForgotPassword()">Forgot your password?</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); padding: 30px; border-radius: 12px; width: 90%; max-width: 400px;">
            <h3>Reset Password</h3>
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" required placeholder="Enter your email">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="closeForgotPassword()" style="flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(30,32,44,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button type="submit" style="flex: 1; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer;">Send Reset Link</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let supabaseReady = false;
        let authServiceReady = false;

        // Wait for Supabase to be ready
        document.addEventListener('supabaseReady', function(event) {
            supabaseReady = true;
            console.log('Auth page: Supabase client ready');
            
            // Wait a bit for AuthService to initialize
            setTimeout(() => {
                if (window.AuthService && typeof window.AuthService.signIn === 'function') {
                    authServiceReady = true;
                    console.log('Auth page: AuthService ready');
                    
                    // Check for logout parameter
                    handleLogoutRedirect();
                    
                    // Check if user is already logged in
                    checkExistingAuth();
                } else {
                    console.error('Auth page: AuthService not properly initialized');
                }
            }, 100);
        });

        // Password visibility toggle
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggle = input.parentNode.querySelector('.password-toggle');
            const svg = toggle.querySelector('svg path');
            
            if (input.type === 'password') {
                input.type = 'text';
                // Eye with slash (hidden)
                svg.setAttribute('d', 'M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7zm8 0c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2zm0 0l3.5-3.5m0 7L9.5 12m0 0L13 8.5M13 8.5l-3.5 3.5');
            } else {
                input.type = 'password';
                // Regular eye (visible)
                svg.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        // Message handling
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            successDiv.style.background = ''; // Reset background
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showInfo(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            successDiv.style.background = '#3b82f6';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'none';
            successDiv.style.background = ''; // Reset background
        }

        // Loading state management
        function setLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button-text');
            
            if (isLoading) {
                button.disabled = true;
                buttonText.innerHTML = '<span class="loading-spinner"></span> Processing...';
            } else {
                button.disabled = false;
                buttonText.textContent = 'Sign In to Admin';
            }
        }

        // Authentication functions
        async function handleSignIn(event) {
            event.preventDefault();
            
            const email = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;

            // If Supabase isn't ready, wait for it (with timeout)
            if (!supabaseReady || !authServiceReady || !window.AuthService) {
                showInfo('Initializing authentication service...');
                
                let attempts = 0;
                const maxAttempts = 30; // 3 seconds max wait
                
                while ((!supabaseReady || !authServiceReady || !window.AuthService) && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                    
                    // Check again
                    if (window.AuthService && typeof window.AuthService.signIn === 'function') {
                        authServiceReady = true;
                    }
                }
                
                if (!supabaseReady || !authServiceReady || !window.AuthService) {
                    showError('Authentication service failed to initialize. Please refresh the page.');
                    return;
                }
                
                clearMessages();
            }

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            setLoading('signinButton', true);
            clearMessages();

            try {
                console.log('Attempting admin sign in for:', email);
                const result = await window.AuthService.signIn(email, password);

                if (result.error) {
                    throw result.error;
                }

                if (result.data?.user) {
                    showSuccess('Sign in successful! Verifying admin access...');
                    
                    // Small delay to ensure auth state is fully processed
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Admin sign in error:', error);
                showError('Sign in failed: ' + (error.message || 'An unexpected error occurred'));
            } finally {
                setLoading('signinButton', false);
            }
        }

        // Forgot password
        function showForgotPassword() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
        }

        function closeForgotPassword() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            
            if (!supabaseReady || !authServiceReady || !window.AuthService) {
                showError('Authentication service not ready. Please refresh the page.');
                return;
            }

            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                showError('Please enter your email address');
                return;
            }

            try {
                clearMessages();
                const result = await window.AuthService.resetPassword(email);

                if (result.error) {
                    throw result.error;
                }

                showSuccess('Password reset email sent! Check your inbox.');
                closeForgotPassword();
            } catch (error) {
                console.error('Password reset error:', error);
                showError('Password reset failed: ' + (error.message || 'An unexpected error occurred'));
            }
        }

        // Check for existing authentication
        function handleLogoutRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const fromLogout = urlParams.get('logout');
            
            if (fromLogout === 'true') {
                console.log('Auth page: Handling logout redirect');
                
                // Show logout success message
                showSuccess('You have been successfully logged out');
                
                // Clean up the URL
                const newUrl = window.location.pathname;
                window.history.replaceState({}, document.title, newUrl);
            }
        }

        async function checkExistingAuth() {
            try {
                // Don't check existing auth if we're coming from logout
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('logout') === 'true') {
                    return; // Skip auth check for logout redirects
                }
                
                // Check if AuthService is available and has the getCurrentUser method
                if (window.AuthService && typeof window.AuthService.getCurrentUser === 'function') {
                    const user = window.AuthService.getCurrentUser();
                    
                    if (user) {
                        // User is already signed in, redirect to admin
                        console.log('User already authenticated, redirecting to admin...');
                        window.location.href = 'admin.html';
                    }
                }
            } catch (error) {
                console.log('No existing authentication found:', error);
            }
        }

        // Handle URL parameters (for email verification, password reset, etc.)
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            const message = urlParams.get('message');

            if (type === 'recovery') {
                showSuccess('You can now reset your password');
            } else if (message) {
                showSuccess(decodeURIComponent(message));
            }

            // Check for auth errors in URL
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');
            
            if (error) {
                showError(errorDescription || 'Authentication error occurred');
            }
        });
    </script>
</body>
</html>
