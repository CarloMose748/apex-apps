<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Jobs - Apex Driver</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d174'><path d='M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z'/></svg>">
  
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Supabase Configuration -->
  <script src="js/supabase-config.js"></script>
  <script src="js/auth-service.js"></script>
  <script src="js/apex-driver-service.js"></script>
  
  <style>
    .jobs-container {
      min-height: 100vh;
      background: #171412;
      padding-bottom: 100px;
    }

    .jobs-header {
      background: #1c1917;
      padding: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--primary-color);
    }

    .jobs-header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .back-button:hover {
      color: var(--primary-color);
    }

    .location-status {
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      background: #292524;
      padding: 10px 16px;
      border-radius: 4px;
      font-weight: 500;
      border: 1px solid #3f3f3f;
    }

    .location-loading {
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top: 2px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .jobs-content {
      padding: 24px 20px;
    }

    .jobs-header-section {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 32px auto;
      padding: 24px;
      background: #292524;
      border-radius: 6px;
      border: 1px solid #3f3f3f;
      border-left: 4px solid var(--primary-color);
    }

    .jobs-title {
      font-size: 1.85rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--primary-color);
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .jobs-title-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary-color) 0%, #0f766e 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .jobs-subtitle {
      color: var(--text-secondary);
      margin-bottom: 0;
      font-size: 15px;
      font-weight: 500;
    }

    .jobs-subtitle .count {
      color: var(--primary-color);
      font-weight: 700;
    }

    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .job-card {
      background: #292524;
      border-radius: 6px;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid #3f3f3f;
      border-left: 4px solid var(--primary-color);
      transition: all 0.15s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    .job-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary-color);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .job-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px var(--primary-color);
      transform: none;
      border-color: var(--primary-color);
    }

    .job-card:hover::before {
      opacity: 1;
    }

    .job-card.featured {
      border-left: 4px solid var(--primary-color);
    }

    .job-card.featured::before {
      opacity: 1;
    }

    .job-icon-section {
      width: 90px;
      min-height: 100%;
      background: #1c1917;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-right: 1px solid #3f3f3f;
    }

    .job-icon-section svg {
      width: 48px;
      height: 48px;
      color: var(--primary-color);
      opacity: 0.9;
    }

    .job-card-content {
      flex: 1;
      padding: 20px 24px;
    }

    .job-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .job-info {
      flex: 1;
    }

    .job-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }

    .job-title svg {
      color: var(--primary-color);
      flex-shrink: 0;
    }

    .job-type {
      font-size: 0.8rem;
      color: var(--primary-color);
      background: rgba(13, 148, 136, 0.15);
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.7rem;
    }

    .job-payment {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-green, #10b981);
      text-align: right;
      letter-spacing: -0.02em;
    }

    .job-details {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .job-distance, .job-time {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .job-distance svg, .job-time svg {
      color: var(--text-muted);
    }

    .job-address {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .job-address svg {
      flex-shrink: 0;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .job-actions {
      display: flex;
      gap: 12px;
    }

    .btn-accept {
      flex: 1;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 3px solid var(--primary-dark);
    }

    .btn-accept:hover {
      background: var(--primary-light);
      transform: none;
      box-shadow: 0 0 12px rgba(13, 148, 136, 0.4);
    }

    .btn-accept:active {
      transform: translateY(1px);
    }

    .btn-details {
      background: #1c1917;
      color: var(--text-secondary);
      border: 1px solid #3f3f3f;
      padding: 14px 20px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn-details:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: rgba(13, 148, 136, 0.1);
    }

    .no-jobs {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-secondary);
      background: #292524;
      border-radius: 6px;
      border: 1px dashed #3f3f3f;
    }

    .no-jobs h3 {
      color: var(--text-primary);
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .no-jobs p {
      color: var(--text-secondary);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .no-jobs-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .priority-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .jobs-content {
        padding: 20px 0;
      }
      
      .job-card {
        padding: 20px;
        border-radius: 16px;
      }
      
      .job-actions {
        flex-direction: column;
      }

      .btn-accept, .btn-details {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .jobs-header {
        padding: 16px 0;
      }

      .jobs-title {
        font-size: 1.5rem;
      }

      .jobs-subtitle {
        font-size: 0.9rem;
      }

      .job-payment {
        font-size: 1.35rem;
      }

      .job-card {
        padding: 18px;
      }

      .location-status {
        padding: 8px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="jobs-container">
    <header class="jobs-header">
      <div class="container">
        <div class="jobs-header-content">
          <!-- <a href="main.html" class="back-button">
            ← Back to Home
          </a> -->
          <div class="header-actions">
            <!-- <a href="dashboard.html" class="back-button" style="margin-right: 15px;">
              📊 Dashboard
            </a> -->
            <div class="location-status" id="locationStatus" aria-live="polite">
              <div class="location-loading"></div>
              <span>Getting your location...</span>
            </div>

        </div>

  <script>
    // Authentication check
    document.addEventListener('supabaseReady', async function() {
      console.log('Jobs page: Supabase ready');
      
      // Check authentication
      const isAuthed = await checkAuth();
      if (!isAuthed) return; // Will redirect to auth page
      
      // Mark that initialization started
      window.jobsInitialized = true;
      
      // Initialize jobs page with a delay to ensure service is ready
      setTimeout(async () => {
        await initializeJobsPage();
      }, 500);
    });

    async function initializeJobsPage() {
      console.log('🚀 Initializing jobs page...');
      
      // Wait for ApexDriverService to be available
      let waitCount = 0;
      while (!window.ApexDriverService && waitCount < 10) {
        console.log('⏳ Waiting for ApexDriverService to be available...');
        await new Promise(resolve => setTimeout(resolve, 100));
        waitCount++;
      }
      
      if (!window.ApexDriverService) {
        console.error('❌ ApexDriverService not available after waiting');
        loadJobsWithoutLocation();
        return;
      }
      
      // Force service to be ready if it isn't already
      if (!window.ApexDriverService.isReady) {
        console.log('🔧 ApexDriverService not ready, forcing initialization...');
        window.ApexDriverService.supabase = window.supabaseClient || window.supabase;
        window.ApexDriverService.isReady = true;
        console.log('✅ Forced ApexDriverService to be ready');
      }
      
      // Also ensure the supabase client is available
      if (!window.ApexDriverService.supabase) {
        console.log('🔧 No supabase client in ApexDriverService, setting it...');
        window.ApexDriverService.supabase = window.supabaseClient || window.supabase;
        console.log('✅ Supabase client set:', !!window.ApexDriverService.supabase);
      }
      
      // First get location, then load jobs
      handleLocation();
    }

    function handleLocation() {
      getUserLocationAndLoadJobs();
    }

    // Get user location and load jobs
    function getUserLocationAndLoadJobs() {
      if (!navigator.geolocation) {
        updateLocationStatus('<span class="icon icon-close icon-sm"></span> Location not supported', false);
        loadJobsFromDatabase(); // Load jobs without location
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          updateLocationStatus('<span class="icon icon-check icon-sm"></span> Location found', true);
          
          // Now load jobs with location data
          await loadJobsFromDatabase();
        },
        async (error) => {
          console.error('Location error:', error);
          updateLocationStatus('<span class="icon icon-location icon-sm"></span> Location unavailable', false);
          
          // Load jobs without location
          await loadJobsFromDatabase();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
      );
    }

    async function loadJobsFromDatabase() {
      try {
        console.log('🔍 Checking ApexDriverService readiness...');
        console.log('ApexDriverService exists:', !!window.ApexDriverService);
        console.log('ApexDriverService isReady:', window.ApexDriverService?.isReady);
        console.log('window.supabaseClient exists:', !!window.supabaseClient);
        console.log('window.supabase exists:', !!window.supabase);
        
        // Force service to be ready if it exists but isn't ready
        if (window.ApexDriverService && !window.ApexDriverService.isReady) {
          console.log('🔧 Forcing ApexDriverService to be ready...');
          window.ApexDriverService.supabase = window.supabaseClient || window.supabase;
          window.ApexDriverService.isReady = true;
          console.log('🔧 ApexDriverService forced ready, supabase client:', !!window.ApexDriverService.supabase);
        }
        
        // Check if ApexDriverService is ready
        if (!window.ApexDriverService || !window.ApexDriverService.isReady) {
          console.log('❌ ApexDriverService still not ready, falling back to static jobs');
          console.log('❌ ApexDriverService:', window.ApexDriverService);
          console.log('❌ isReady:', window.ApexDriverService?.isReady);
          loadJobsWithoutLocation();
          return;
        }

        // Additional check: Make sure supabase client is available
        if (!window.ApexDriverService.supabase) {
          console.log('❌ ApexDriverService has no supabase client, falling back to static jobs');
          loadJobsWithoutLocation();
          return;
        }

        console.log('✅ ApexDriverService is ready, attempting to fetch jobs...');

        // Test the service connection
        try {
          console.log('🧪 Testing ApexDriverService connection...');
          console.log('🧪 Service instance:', window.ApexDriverService);
          console.log('🧪 Service supabase:', window.ApexDriverService.supabase);
          console.log('🧪 Service isReady:', window.ApexDriverService.isReady);
          
          // Try a simple connection test
          if (window.ApexDriverService.supabase) {
            const testResult = await window.ApexDriverService.supabase.from('jobs').select('id').limit(1);
            console.log('🧪 Connection test result:', testResult);
          }
        } catch (testError) {
          console.error('🧪 Connection test failed:', testError);
        }

        // Get user location if available for distance-based sorting
        let latitude = null, longitude = null;
        if (userLocation) {
          latitude = userLocation.lat;
          longitude = userLocation.lng;
          console.log('📍 Using location:', { latitude, longitude });
        } else {
          console.log('📍 No location available');
        }

        console.log('🚀 Calling getAvailableJobs...');
        const { data, error } = await window.ApexDriverService.getAvailableJobs(latitude, longitude);
        
        console.log('📊 Database response:', { data, error });
        console.log('📊 Number of jobs returned:', data?.length || 0);
        console.log('📊 Raw database jobs:', data);
        console.log('📊 Database error details:', error);
        
        if (error) {
          console.error('❌ Error loading jobs:', error);
          console.error('❌ Error message:', error.message);
          console.error('❌ Error details:', error.details);
          console.error('❌ Error hint:', error.hint);
          // Fall back to static jobs
          console.log('🔄 Falling back to static jobs due to database error');
          loadJobsWithoutLocation();
        } else {
          console.log('✅ Successfully loaded jobs from database:', data);
          
          // The ApexDriverService already formats the data correctly, so we can use it directly
          if (data && data.length > 0) {
            console.log('📋 Using database jobs, count:', data.length);
            console.log('📋 Database jobs data:', data);
            
            // IMPORTANT: Don't use window.availableJobs - use a direct variable
            console.log('📋 Before assignment - availableJobs:', availableJobs);
            
            // Update the global availableJobs directly
            availableJobs = data;
            window.availableJobs = data;
            
            console.log('📋 After assignment - availableJobs:', availableJobs);
            console.log('📋 After assignment - window.availableJobs:', window.availableJobs);
            
            // Force update the display immediately
            if (userLocation) {
              console.log('🎯 Rendering jobs with distance...');
              loadJobsWithDistance();
            } else {
              console.log('🎯 Rendering jobs without distance...');
              loadJobsWithoutLocation();
            }
            
            // Also update the subtitle to show we're using database data
            document.getElementById('jobsSubtitle').innerHTML = 
              `<span class="count">${data.length}</span> oil collection jobs available`;
          } else {
            console.log('📋 No jobs in database');
            // No jobs in database, show empty state
            showNoJobsAvailable();
          }
        }
      } catch (error) {
        console.error('💥 Exception in loadJobsFromDatabase:', error);
        console.log('🔄 Exception caught, showing empty state');
        showNoJobsAvailable();
      }
    }

    // Show the no jobs available message
    function showNoJobsAvailable() {
      const jobsList = document.getElementById('jobsList');
      const noJobs = document.getElementById('noJobs');
      
      jobsList.style.display = 'none';
      noJobs.style.display = 'block';
      
      document.getElementById('jobsSubtitle').innerHTML = 
        'No jobs currently available in your area';
    }

    function initializeExistingFunctionality() {

    // Calculate distance between two points (Haversine formula)
    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371; // Earth's radius in kilometers
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
        Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Load jobs with calculated distances
    function loadJobsWithDistance() {
      console.log('📍 Loading jobs with distance...');
      console.log('availableJobs count before distance calc:', availableJobs?.length || 0);
      console.log('availableJobs data before distance calc:', availableJobs);
      
      // Calculate distances and sort
      sortedJobs = availableJobs.map(job => {
        const distance = calculateDistance(
          userLocation.lat, userLocation.lng,
          job.lat, job.lng
        );
        return {
          ...job,
          distance: distance,
          distanceText: distance < 1 
            ? `${Math.round(distance * 1000)}m away`
            : `${distance.toFixed(1)}km away`
        };
      }).sort((a, b) => a.distance - b.distance);

      console.log('sortedJobs count after distance calc:', sortedJobs?.length || 0);
      console.log('sortedJobs data after distance calc:', sortedJobs);

            : `${distance.toFixed(1)}km away`

    // Job actions
    function selectJob(jobId) {
      viewJobInfo(jobId);
    }

    function viewJobInfo(jobId) {
      const job = sortedJobs.find(j => j.id == jobId); // Use == instead of === to handle string/number comparison
      
      if (job) {
        // Store selected job and go to job details page
        localStorage.setItem('selectedJobForInfo', JSON.stringify(job));
        if (userLocation) {
          localStorage.setItem('userLocation', JSON.stringify(userLocation));
        }
        window.location.href = 'job-detail.html';
      } else {
        console.error('❌ Job not found with ID:', jobId);
        alert('Job not found. Please try refreshing the page.');
      }
    }

    async function acceptJob(jobId) {
      const job = sortedJobs.find(j => j.id == jobId); // Use == instead of === to handle string/number comparison
      
      if (!job) {
        console.error('❌ Job not found for accept with ID:', jobId);
        alert('Job not found. Please try refreshing the page.');
        return;
      }

      if (!confirm(`Accept job: ${job.name} for ${job.payment}?`)) {
        return;
      }

      try {
        // Show loading state
        const button = event?.target;
        const originalText = button?.textContent;
        if (button) {
          button.disabled = true;
          button.textContent = '⏳ Accepting...';
        }

        // Get current driver ID
        const driverResult = await getCurrentDriverId();
        if (driverResult.error) {
          console.error('❌ Driver lookup failed:', driverResult);
          
          let errorMessage = 'Unable to identify driver. ';
          if (driverResult.details && driverResult.details.includes('No driver record exists')) {
            errorMessage = `Driver registration required. No driver record found for your email (${driverResult.userEmail}). Please complete driver registration first.`;
          } else if (driverResult.details && driverResult.details.includes('Database error')) {
            errorMessage = 'Database connection issue. Please check your internet connection and try again.';
          } else {
            errorMessage = `${driverResult.error}: ${driverResult.details}`;
          }
          
          alert(errorMessage);
          return;
        }
        
        const driverId = driverResult.driverId;

        // Accept the job in the database
        const { data, error } = await window.ApexDriverService.acceptJob(jobId, driverId);
        
        if (error) {
          console.error('❌ Error accepting job:', error);
          if (error.message.includes('No rows returned')) {
            alert('This job is no longer available. It may have been accepted by another driver.');
            // Refresh jobs list
            loadJobsFromDatabase();
          } else {
            alert('Failed to accept job. Please try again.');
          }
          return;
        }

        if (data) {
          console.log('✅ Job accepted successfully:', data);
          
          // Store accepted job and go to map
          const acceptedJob = { ...job, status: 'in_progress', driver_id: driverId };
          localStorage.setItem('acceptedJob', JSON.stringify(acceptedJob));
          
          // Remove job from current list since it's now in progress
          availableJobs = availableJobs.filter(j => j.id != jobId);
          
          // Refresh the display
          if (userLocation) {
            loadJobsWithDistance();
          } else {
            loadJobsWithoutLocation();
          }
          
          // Go to map after a brief delay to show success
          setTimeout(() => {
            goToMap();
          }, 500);
        }
      } catch (error) {
        console.error('❌ Exception accepting job:', error);
        alert('An error occurred while accepting the job. Please try again.');
      } finally {
        // Reset button state
        if (button) {
          button.disabled = false;
          button.textContent = originalText || 'Accept';
        }
      }
    }

    function viewJobDetails(jobId) {
      const job = sortedJobs.find(j => j.id == jobId); // Use == instead of === to handle string/number comparison
      
      if (job) {
        localStorage.setItem('selectedJob', JSON.stringify(job));
        goToMap();
      } else {
        console.error('❌ Job not found for details with ID:', jobId);
        alert('Job not found. Please try refreshing the page.');
      }
    }

    function goToMap() {
      // Store user location for map
      if (userLocation) {
        localStorage.setItem('userLocation', JSON.stringify(userLocation));
      }
      window.location.href = 'map.html';
    }

    // Helper function to get current driver ID
    async function getCurrentDriverId() {
      try {
        console.log('🔍 Getting current driver ID...');
        
        // Get current authenticated user
        const { user, error } = await SupabaseUtils.getCurrentUser();
        console.log('🔍 Current user result:', { user: user?.email, error });
        
        if (error || !user) {
          console.error('❌ Error getting current user:', error);
          return { error: 'Failed to get current user', details: error };
        }

        console.log('🔍 Looking up driver with email:', user.email);
        
        // Ensure ApexDriverService is ready
        if (!window.ApexDriverService || !window.ApexDriverService.isReady) {
          console.error('❌ ApexDriverService not ready');
          return { error: 'Database service not ready', details: 'ApexDriverService not available' };
        }

        // Get driver record by email
        const { data: driver, error: driverError } = await window.ApexDriverService.getDriverByEmail(user.email);
        console.log('🔍 Driver lookup result:', { driver, driverError });
        
        if (driverError) {
          console.error('❌ Database error getting driver record:', driverError);
          
          // Check if it's a "no rows" error (driver doesn't exist)
          if (driverError.details && driverError.details.includes('0 rows')) {
            return { 
              error: 'Driver record not found', 
              details: `No driver record exists for email: ${user.email}. Please register as a driver first.`,
              userEmail: user.email
            };
          }
          
          return { error: 'Database error', details: driverError };
        }
        
        if (!driver) {
          console.error('❌ No driver found with email:', user.email);
          return { 
            error: 'Driver record not found', 
            details: `No driver record exists for email: ${user.email}. Please register as a driver first.`,
            userEmail: user.email
          };
        }

        console.log('✅ Found driver:', driver.id, driver.full_name);
        return { driverId: driver.id, driver };
        
      } catch (error) {
        console.error('❌ Exception getting current driver ID:', error);
        return { error: 'Unexpected error', details: error.message || error };
      }
    }

      console.log('🔍 === DRIVER DEBUG INFO ===');

          console.log('🔍 Drivers in table:', allDrivers);

          // Check if current user has a driver record
          const driverResult = await getCurrentDriverId();
          console.log('🔍 Current user driver lookup result:', driverResult);
        }
        
      } catch (error) {
        console.error('🔍 Debug error:', error);
      }
      
      console.log('🔍 === END DRIVER DEBUG ===');
    }

    // Make debug function available in console
    window.debugDriverSetup = debugDriverSetup;
  </script>
