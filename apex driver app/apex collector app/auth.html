<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Driver - Sign In</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d174'><path d='M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z'/></svg>">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Configuration -->
    <script src="js/supabase-config.js"></script>
    <script src="js/apex-driver-service.js"></script>
    
    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #00d174 100%);
            background-size: 200% 200%;
            animation: gradientFlow 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #00b562 100%);
            color: white;
            padding: 36px 30px 28px;
            text-align: center;
            position: relative;
        }

        .auth-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
        }

        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.02em;
        }

        .auth-logo .icon {
            width: 36px;
            height: 36px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        .auth-subtitle {
            opacity: 0.92;
            font-size: 1rem;
            font-weight: 400;
        }

        .auth-form {
            padding: 32px 30px 28px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 28px;
            background: var(--background-gray);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 12px 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-tab:hover {
            color: var(--text-primary);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary-color) 0%, #00b562 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 209, 116, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.25s ease;
            background: white;
            box-sizing: border-box;
        }

        .form-group input:hover {
            border-color: #cbd5e1;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(0, 209, 116, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            margin-top: 14px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .auth-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #00b562 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0, 209, 116, 0.25);
        }

        .auth-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #00b562 0%, #009952 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 209, 116, 0.35);
        }

        .auth-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
            color: var(--text-secondary);
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }

        .auth-divider span {
            background: white;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 500;
        }

        .social-buttons {
            display: grid;
            gap: 12px;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: white;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.25s ease;
            font-size: 14px;
            cursor: pointer;
        }

        .social-button:hover {
            border-color: var(--primary-color);
            background: var(--primary-50);
            transform: translateY(-1px);
        }

        .social-button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .error-message {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: #dc2626;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #fecaca;
            font-weight: 500;
        }

        .success-message {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #16a34a;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #bbf7d0;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .user-type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .user-type-option {
            padding: 18px 14px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: white;
        }

        .user-type-option:hover {
            border-color: #cbd5e1;
            background: var(--background-gray);
        }

        .user-type-option.selected {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            box-shadow: 0 4px 12px rgba(0, 209, 116, 0.15);
        }

        .user-type-option .icon {
            font-size: 1.75rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
        }

        .user-type-option.selected .icon {
            color: var(--primary-color);
        }

        .user-type-option .icon svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .user-type-option .label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 16px;
            }

            .auth-card {
                border-radius: 16px;
            }
            
            .auth-form {
                padding: 24px 20px;
            }
            
            .auth-header {
                padding: 28px 20px 22px;
            }

            .auth-logo {
                font-size: 1.75rem;
            }

            .user-type-option {
                padding: 14px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                    </svg>
                    Apex Driver
                </div>
                <div class="auth-subtitle">Your reliable delivery partner</div>
            </div>
            
            <div class="auth-form">
                <!-- Tab Navigation -->
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="switchTab('signin')">Sign In</div>
                    <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
                </div>

                <!-- Error/Success Messages -->
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <!-- Sign In Form -->
                <div id="signinForm" class="form-section active">
                    <form onsubmit="handleSignIn(event)">
                        <div class="form-group">
                            <label for="signinEmail">Email Address</label>
                            <input type="email" id="signinEmail" required placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label for="signinPassword">Password</label>
                            <input type="password" id="signinPassword" required placeholder="Enter your password">
                            <span class="password-toggle" onclick="togglePassword('signinPassword')">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </span>
                        </div>
                        
                        <button type="submit" class="auth-button" id="signinButton">
                            <span class="button-text">Sign In</span>
                        </button>
                    </form>
                    
                    <div class="forgot-password">
                        <a href="#" onclick="showForgotPassword()">Forgot your password?</a>
                    </div>
                </div>

                <!-- Sign Up Form -->
                <div id="signupForm" class="form-section">
                    <form onsubmit="handleSignUp(event)">
                        <!-- User Type Selection -->
                        <div class="user-type-selector">
                            <div class="user-type-option selected" onclick="selectUserType('driver')" data-type="driver">
                                <div class="icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                                    </svg>
                                </div>
                                <div class="label">Driver</div>
                            </div>
                            <div class="user-type-option" onclick="selectUserType('customer')" data-type="customer">
                                <div class="icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M19 7h-3V6c0-1.1-.9-2-2-2H10c-1.1 0-2 .9-2 2v1H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 6h4v1h-4V6zm9 13H5V9h3v1h8V9h3v10z"/>
                                    </svg>
                                </div>
                                <div class="label">Customer</div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="signupFullName">Full Name</label>
                            <input type="text" id="signupFullName" required placeholder="Enter your full name">
                        </div>
                        
                        <div class="form-group">
                            <label for="signupEmail">Email Address</label>
                            <input type="email" id="signupEmail" required placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label for="signupPhone">Phone Number</label>
                            <input type="tel" id="signupPhone" required placeholder="+27 123 456 789">
                        </div>
                        
                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <input type="password" id="signupPassword" required placeholder="Create a secure password" minlength="6">
                            <span class="password-toggle" onclick="togglePassword('signupPassword')">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </span>
                        </div>
                        
                        <div class="form-group">
                            <label for="signupConfirmPassword">Confirm Password</label>
                            <input type="password" id="signupConfirmPassword" required placeholder="Confirm your password">
                            <span class="password-toggle" onclick="togglePassword('signupConfirmPassword')">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </span>
                        </div>
                        
                        <!-- Driver-specific fields -->
                        <div id="driverFields" class="driver-specific">
                            <div class="form-group">
                                <label for="vehicleType">Vehicle Type</label>
                                <select id="vehicleType" required>
                                    <option value="">Select vehicle type</option>
                                    <option value="car">Car</option>
                                    <option value="motorcycle">Motorcycle</option>
                                    <option value="bicycle">Bicycle</option>
                                    <option value="van">Van</option>
                                    <option value="truck">Truck</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="licenseNumber">License Number</label>
                                <input type="text" id="licenseNumber" placeholder="Enter your license number">
                            </div>
                        </div>
                        
                        <button type="submit" class="auth-button" id="signupButton">
                            <span class="button-text">Create Account</span>
                        </button>
                    </form>
                </div>

                <!-- Social Login Options -->
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>
                
                <div class="social-buttons">
                    <button class="social-button" onclick="signInWithGoogle()">
                        <svg viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px;">
            <h3>Reset Password</h3>
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" required placeholder="Enter your email">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="closeForgotPassword()" style="flex: 1; padding: 12px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button type="submit" style="flex: 1; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer;">Send Reset Link</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUserType = 'driver';
        let supabaseReady = false;

        // Wait for Supabase to be ready
        document.addEventListener('supabaseReady', function(event) {
            supabaseReady = true;
            console.log('Auth page: Supabase client ready');
            
            // Check for logout parameter
            handleLogoutRedirect();
            
            // Check if user is already logged in
            checkExistingAuth();
        });

        // Tab switching
        function switchTab(tab) {
            // Update tab appearance
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab:${tab === 'signin' ? 'first-child' : 'last-child'}`).classList.add('active');
            
            // Show appropriate form
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + 'Form').classList.add('active');
            
            clearMessages();
        }

        // User type selection
        function selectUserType(type) {
            currentUserType = type;
            
            // Update UI
            document.querySelectorAll('.user-type-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.querySelector(`[data-type="${type}"]`).classList.add('selected');
            
            // Show/hide driver fields
            const driverFields = document.getElementById('driverFields');
            if (type === 'driver') {
                driverFields.style.display = 'block';
                document.getElementById('vehicleType').required = true;
            } else {
                driverFields.style.display = 'none';
                document.getElementById('vehicleType').required = false;
            }
        }

        // Password visibility toggle
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggle = input.parentNode.querySelector('.password-toggle');
            const svg = toggle.querySelector('svg path');
            
            if (input.type === 'password') {
                input.type = 'text';
                // Eye with slash (hidden)
                svg.setAttribute('d', 'M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7zm8 0c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2zm0 0l3.5-3.5m0 7L9.5 12m0 0L13 8.5M13 8.5l-3.5 3.5');
            } else {
                input.type = 'password';
                // Regular eye (visible)
                svg.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        // Message handling
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Loading state management
        function setLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button-text');
            
            if (isLoading) {
                button.disabled = true;
                buttonText.innerHTML = '<span class="loading-spinner"></span> Processing...';
            } else {
                button.disabled = false;
                buttonText.textContent = buttonId === 'signinButton' ? 'Sign In' : 'Create Account';
            }
        }

        // Authentication functions
        async function handleSignIn(event) {
            event.preventDefault();
            
            if (!supabaseReady) {
                showError('Authentication service not ready. Please refresh the page.');
                return;
            }

            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;

            setLoading('signinButton', true);
            clearMessages();

            try {
                const { data, error } = await SupabaseUtils.signIn(email, password);

                if (error) {
                    showError(error.message);
                } else if (data.user) {
                    showSuccess('Sign in successful! Redirecting...');
                    
                    // Store user info
                    localStorage.setItem('apex_user', JSON.stringify({
                        id: data.user.id,
                        email: data.user.email,
                        user_metadata: data.user.user_metadata
                    }));
                    
                    // Redirect based on user type
                    setTimeout(() => {
                        const userType = data.user.user_metadata?.user_type || 'driver';
                        if (userType === 'driver') {
                            window.location.href = 'main.html';
                        } else {
                            window.location.href = 'main.html'; // Could redirect to customer dashboard
                        }
                    }, 1500);
                }
            } catch (error) {
                showError('An unexpected error occurred. Please try again.');
                console.error('Sign in error:', error);
            } finally {
                setLoading('signinButton', false);
            }
        }

        async function handleSignUp(event) {
            event.preventDefault();
            
            if (!supabaseReady) {
                showError('Authentication service not ready. Please refresh the page.');
                return;
            }

            const fullName = document.getElementById('signupFullName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const vehicleType = document.getElementById('vehicleType').value;
            const licenseNumber = document.getElementById('licenseNumber').value;

            // Validation
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (currentUserType === 'driver' && !vehicleType) {
                showError('Please select a vehicle type for driver registration');
                return;
            }

            setLoading('signupButton', true);
            clearMessages();

            try {
                // Prepare user metadata
                const metadata = {
                    full_name: fullName,
                    phone_number: phone,
                    user_type: currentUserType,
                };

                if (currentUserType === 'driver') {
                    metadata.vehicle_type = vehicleType;
                    metadata.license_number = licenseNumber;
                }

                const { data, error } = await SupabaseUtils.signUp(email, password, metadata);

                if (error) {
                    showError(error.message);
                } else {
                    showSuccess('Account created successfully! Please check your email to verify your account.');
                    
                    // Wait a moment for the session to be established, then create user record
                    if (data.user) {
                        // Wait for authentication to be properly established
                        setTimeout(async () => {
                            try {
                                if (currentUserType === 'driver') {
                                    await createDriverRecord(data.user, {
                                        fullName,
                                        phone,
                                        vehicleType,
                                        licenseNumber
                                    });
                                } else {
                                    await createCustomerRecord(data.user, {
                                        fullName,
                                        phone
                                    });
                                }
                            } catch (error) {
                                console.log('User record creation will be handled on first login');
                            }
                        }, 1000);
                    }
                    
                    // Switch to sign in tab
                    setTimeout(() => {
                        switchTab('signin');
                        document.getElementById('signinEmail').value = email;
                    }, 2000);
                }
            } catch (error) {
                showError('An unexpected error occurred. Please try again.');
                console.error('Sign up error:', error);
            } finally {
                setLoading('signupButton', false);
            }
        }

        async function createDriverRecord(user, driverData) {
            try {
                const driverRecord = {
                    email: user.email,
                    full_name: driverData.fullName,
                    phone_number: driverData.phone,
                    vehicle_type: driverData.vehicleType,
                    license_number: driverData.licenseNumber,
                    vehicle_make: '', // Can be filled later in profile
                    vehicle_model: '', // Can be filled later in profile
                    vehicle_year: null, // Can be filled later in profile
                    vehicle_plate: '', // Can be filled later in profile
                    verification_status: 'pending' // Set to pending for admin verification
                };

                const { error } = await SupabaseUtils.insertRecord('drivers', driverRecord);
                
                if (error) {
                    console.error('Error creating driver record:', error);
                } else {
                    console.log('Driver record created successfully');
                }
            } catch (error) {
                console.error('Error creating driver record:', error);
                // Don't show this error to user as signup was successful
            }
        }

        async function createCustomerRecord(user, customerData) {
            try {
                const customerRecord = {
                    email: user.email,
                    full_name: customerData.fullName,
                    phone_number: customerData.phone,
                    verification_status: 'pending' // Set to pending for admin verification
                };

                const { error } = await SupabaseUtils.insertRecord('customers', customerRecord);
                
                if (error) {
                    console.error('Error creating customer record:', error);
                } else {
                    console.log('Customer record created successfully');
                }
            } catch (error) {
                console.error('Error creating customer record:', error);
                // Don't show this error to user as signup was successful
            }
        }

        async function signInWithGoogle() {
            if (!supabaseReady) {
                showError('Authentication service not ready. Please refresh the page.');
                return;
            }

            try {
                const client = window.getSupabaseClient();
                const { data, error } = await client.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/main.html'
                    }
                });

                if (error) {
                    showError('Google sign-in failed: ' + error.message);
                }
            } catch (error) {
                showError('An error occurred with Google sign-in');
                console.error('Google sign-in error:', error);
            }
        }

        // Forgot password
        function showForgotPassword() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
        }

        function closeForgotPassword() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            
            if (!supabaseReady) {
                showError('Authentication service not ready. Please refresh the page.');
                return;
            }

            const email = document.getElementById('resetEmail').value;

            try {
                const client = window.getSupabaseClient();
                const { error } = await client.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/auth.html'
                });

                if (error) {
                    showError('Error sending reset email: ' + error.message);
                } else {
                    showSuccess('Password reset email sent! Check your inbox.');
                    closeForgotPassword();
                }
            } catch (error) {
                showError('An error occurred sending the reset email');
                console.error('Password reset error:', error);
            }
        }

        // Check for existing authentication
        function handleLogoutRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const fromLogout = urlParams.get('logout');
            
            if (fromLogout === 'true') {
                console.log('Auth page: Handling logout redirect');
                
                // Clear any remaining session data
                try {
                    localStorage.removeItem('apex_user');
                    localStorage.removeItem('driverId');
                    localStorage.clear(); // Clear all localStorage for this domain
                    sessionStorage.clear(); // Clear all sessionStorage for this domain
                    
                    // Show logout success message
                    showSuccess('You have been successfully logged out');
                    
                    // Clean up the URL
                    const newUrl = window.location.pathname;
                    window.history.replaceState({}, document.title, newUrl);
                } catch (error) {
                    console.error('Error clearing session data:', error);
                }
            }
        }

        async function checkExistingAuth() {
            try {
                // Don't check existing auth if we're coming from logout
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('logout') === 'true') {
                    return; // Skip auth check for logout redirects
                }
                
                const { user, error } = await SupabaseUtils.getCurrentUser();
                
                if (user && !error) {
                    // User is already signed in, redirect to main app
                    window.location.href = 'main.html';
                }
            } catch (error) {
                console.log('No existing authentication found');
            }
        }

        // Handle URL parameters (for email verification, password reset, etc.)
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            const message = urlParams.get('message');

            if (type === 'recovery') {
                showSuccess('You can now reset your password');
                // Show password reset form or redirect to password reset page
            } else if (message) {
                showSuccess(decodeURIComponent(message));
            }

            // Check for auth errors in URL
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');
            
            if (error) {
                showError(errorDescription || 'Authentication error occurred');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize user type
            selectUserType('driver');
        });
    </script>
