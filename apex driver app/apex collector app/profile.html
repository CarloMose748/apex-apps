<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Apex Driver</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d174'><path d='M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z'/></svg>">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Configuration -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/apex-driver-service.js"></script>
    
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #00b562 100%);
            color: white;
            padding: 36px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 209, 116, 0.25);
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            margin: 0 auto 16px;
            position: relative;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .profile-header h1 {
            position: relative;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .profile-header p {
            position: relative;
            opacity: 0.9;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .profile-section {
            background: white;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }

        .profile-section h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .form-group input:hover, .form-group select:hover, .form-group textarea:hover {
            border-color: #cbd5e1;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 209, 116, 0.1);
        }

        .form-group input:disabled {
            background: var(--background-gray);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #00b562 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 209, 116, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #00b562 0%, #009952 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 209, 116, 0.35);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
        }

        .status-active { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color: #065f46; }
        .status-busy { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #92400e; }
        .status-offline { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); color: #991b1b; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            padding: 22px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
            transition: all 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.4);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.92;
        }

        .back-nav {
            margin-bottom: 20px;
        }

        .back-nav a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            padding: 8px 14px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .back-nav a:hover {
            background: var(--primary-50);
            border-color: var(--primary-color);
            transform: translateX(-4px);
        }

        .success-message, .error-message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .success-message {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .error-message {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 16px;
            }

            .profile-header {
                padding: 28px 20px;
            }

            .profile-section {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Navigation -->
        <div class="back-nav">
            <a href="main.html">← Back to Dashboard</a>
        </div>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
            <h1 id="profileName">Loading...</h1>
            <p id="profileEmail">Loading...</p>
            <span id="profileStatus" class="status-badge">Loading...</span>
        </div>

        <!-- Messages -->
        <div id="successMessage" class="success-message" style="display: none;"></div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Basic Information -->
        <div class="profile-section">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> Basic Information</h3>
            <form id="basicInfoForm" onsubmit="updateBasicInfo(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userType">User Type</label>
                        <input type="text" id="userType" disabled>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="basicInfoBtn">
                    Update Basic Information
                </button>
            </form>
        </div>

        <!-- Driver Information (shown only for drivers) -->
        <div id="driverSection" class="profile-section" style="display: none;">
            <h3><span class="icon icon-car" style="width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-right: 6px;"></span> Driver Information</h3>
            <form id="driverInfoForm" onsubmit="updateDriverInfo(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="vehicleType">Vehicle Type</label>
                        <select id="vehicleType">
                            <option value="car">Car</option>
                            <option value="motorcycle">Motorcycle</option>
                            <option value="bicycle">Bicycle</option>
                            <option value="van">Van</option>
                            <option value="truck">Truck</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="licenseNumber">License Number</label>
                        <input type="text" id="licenseNumber">
                    </div>
                    
                    <div class="form-group">
                        <label for="vehicleMake">Vehicle Make</label>
                        <input type="text" id="vehicleMake" placeholder="e.g., Toyota">
                    </div>
                    
                    <div class="form-group">
                        <label for="vehicleModel">Vehicle Model</label>
                        <input type="text" id="vehicleModel" placeholder="e.g., Corolla">
                    </div>
                    
                    <div class="form-group">
                        <label for="vehicleYear">Vehicle Year</label>
                        <input type="number" id="vehicleYear" min="1990" max="2030">
                    </div>
                    
                    <div class="form-group">
                        <label for="vehiclePlate">License Plate</label>
                        <input type="text" id="vehiclePlate" placeholder="e.g., CA123GP">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="driverInfoBtn">
                    Update Driver Information
                </button>
            </form>
        </div>

        <!-- Statistics (for drivers) -->
        <div id="statsSection" class="profile-section" style="display: none;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg> Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalJobs">-</div>
                    <div class="stat-label">Total Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalEarnings">-</div>
                    <div class="stat-label">Total Earnings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgJobValue">-</div>
                    <div class="stat-label">Avg Job Value</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="driverRating">-</div>
                    <div class="stat-label">Rating</div>
                </div>
            </div>
        </div>

        <!-- Security Settings -->
        <div class="profile-section">
            <h3>🔐 Security Settings</h3>
            <form id="passwordForm" onsubmit="updatePassword(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" minlength="6" placeholder="Leave blank to keep current password">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-secondary" id="passwordBtn">
                    Update Password
                </button>
            </form>
        </div>

        <!-- Account Actions -->
        <div class="profile-section">
            <h3><span class="icon icon-bolt" style="width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-right: 6px;"></span> Account Actions</h3>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button class="btn btn-secondary" onclick="refreshProfile()">
                    <span class="icon icon-refresh" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px;"></span> Refresh Profile
                </button>
                
                <button class="btn btn-danger" onclick="confirmLogout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 4px;"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg> Logout
                </button>
                
                <a href="test.html" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display: inline-block; vertical-align: middle; margin-right: 4px;"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM10 17l-3.5-3.5 1.41-1.41L10 14.17l4.59-4.59 1.41 1.41L10 17z"/></svg> Test Suite
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let driverRecord = null;

        // Wait for Supabase to be ready and check auth
        document.addEventListener('supabaseReady', async function() {
            console.log('Profile page: Supabase ready');
            
            // Check authentication
            const isAuthed = await checkAuth();
            if (!isAuthed) return; // Will redirect to auth page
            
            // Load user profile
            await loadUserProfile();
        });

        async function loadUserProfile() {
            try {
                // Get current user
                currentUser = AuthService.getCurrentUser();
                const userInfo = await AuthService.formatUserInfo(); // Now async
                
                if (!currentUser || !userInfo) {
                    showError('Unable to load user information');
                    return;
                }

                // Display user info in header
                document.getElementById('profileName').textContent = userInfo.name;
                document.getElementById('profileEmail').textContent = userInfo.email;
                
                // Set avatar
                const avatar = document.getElementById('profileAvatar');
                if (userInfo.userType === 'driver') {
                    avatar.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>';
                } else if (userInfo.userType === 'admin') {
                    avatar.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>';
                } else {
                    avatar.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
                }

                // Fill form fields
                document.getElementById('fullName').value = userInfo.name || '';
                document.getElementById('email').value = userInfo.email || '';
                document.getElementById('phoneNumber').value = userInfo.phoneNumber || '';
                document.getElementById('userType').value = userInfo.userType?.toUpperCase() || '';

                // Show driver section if user is a driver
                if (userInfo.userType === 'driver') {
                    document.getElementById('driverSection').style.display = 'block';
                    document.getElementById('statsSection').style.display = 'block';
                    await loadDriverInfo();
                    await loadDriverStats();
                }

                // Set status badge
                const statusBadge = document.getElementById('profileStatus');
                if (userInfo.userType === 'driver' && driverRecord) {
                    statusBadge.textContent = driverRecord.status || 'active';
                    statusBadge.className = `status-badge status-${driverRecord.status || 'active'}`;
                } else {
                    statusBadge.textContent = 'active';
                    statusBadge.className = 'status-badge status-active';
                }

            } catch (error) {
                console.error('Error loading profile:', error);
                showError('Failed to load profile information');
            }
        }

        async function loadDriverInfo() {
            try {
                // Get driver record from database
                const { data, error } = await SupabaseUtils.selectRecords('drivers', { 
                    email: currentUser.email 
                }, { limit: 1 });

                if (error) {
                    console.error('Error loading driver info:', error);
                    return;
                }

                if (data && data.length > 0) {
                    driverRecord = data[0];
                    
                    // Fill driver form fields
                    document.getElementById('vehicleType').value = driverRecord.vehicle_type || '';
                    document.getElementById('licenseNumber').value = driverRecord.license_number || '';
                    document.getElementById('vehicleMake').value = driverRecord.vehicle_make || '';
                    document.getElementById('vehicleModel').value = driverRecord.vehicle_model || '';
                    document.getElementById('vehicleYear').value = driverRecord.vehicle_year || '';
                    document.getElementById('vehiclePlate').value = driverRecord.vehicle_plate || '';
                }
            } catch (error) {
                console.error('Error loading driver info:', error);
            }
        }

        async function loadDriverStats() {
            try {
                if (!driverRecord) return;

                const { data, error } = await ApexDriverService.getDriverStats(driverRecord.id);

                if (error) {
                    console.error('Error loading driver stats:', error);
                    return;
                }

                if (data) {
                    document.getElementById('totalJobs').textContent = data.totalJobs || 0;
                    document.getElementById('totalEarnings').textContent = `R${data.totalEarnings?.toFixed(2) || '0.00'}`;
                    document.getElementById('avgJobValue').textContent = `R${data.averageJobValue?.toFixed(2) || '0.00'}`;
                    document.getElementById('driverRating').textContent = (driverRecord.rating || 5.0).toFixed(1);
                }
            } catch (error) {
                console.error('Error loading driver stats:', error);
            }
        }

        async function updateBasicInfo(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const phoneNumber = document.getElementById('phoneNumber').value;

            try {
                setLoading('basicInfoBtn', true);
                clearMessages();

                // Update Supabase user metadata
                const { error } = await AuthService.updateProfile({
                    full_name: fullName,
                    phone_number: phoneNumber
                });

                if (error) {
                    showError('Failed to update profile: ' + error.message);
                } else {
                    showSuccess('Basic information updated successfully!');
                    
                    // Update driver record if applicable
                    if (driverRecord) {
                        await SupabaseUtils.updateRecord('drivers', driverRecord.id, {
                            full_name: fullName,
                            phone_number: phoneNumber
                        });
                    }
                }
            } catch (error) {
                console.error('Error updating basic info:', error);
                showError('An unexpected error occurred');
            } finally {
                setLoading('basicInfoBtn', false);
            }
        }

        async function updateDriverInfo(event) {
            event.preventDefault();
            
            if (!driverRecord) {
                showError('Driver record not found');
                return;
            }

            const vehicleType = document.getElementById('vehicleType').value;
            const licenseNumber = document.getElementById('licenseNumber').value;
            const vehicleMake = document.getElementById('vehicleMake').value;
            const vehicleModel = document.getElementById('vehicleModel').value;
            const vehicleYear = document.getElementById('vehicleYear').value;
            const vehiclePlate = document.getElementById('vehiclePlate').value;

            try {
                setLoading('driverInfoBtn', true);
                clearMessages();

                const updates = {
                    vehicle_type: vehicleType,
                    license_number: licenseNumber,
                    vehicle_make: vehicleMake,
                    vehicle_model: vehicleModel,
                    vehicle_year: vehicleYear ? parseInt(vehicleYear) : null,
                    vehicle_plate: vehiclePlate
                };

                const { error } = await SupabaseUtils.updateRecord('drivers', driverRecord.id, updates);

                if (error) {
                    showError('Failed to update driver information: ' + error.message);
                } else {
                    showSuccess('Driver information updated successfully!');
                    driverRecord = { ...driverRecord, ...updates };
                }
            } catch (error) {
                console.error('Error updating driver info:', error);
                showError('An unexpected error occurred');
            } finally {
                setLoading('driverInfoBtn', false);
            }
        }

        async function updatePassword(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword) {
                return; // No password change requested
            }

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            try {
                setLoading('passwordBtn', true);
                clearMessages();

                const { error } = await AuthService.updatePassword(newPassword);

                if (error) {
                    showError('Failed to update password: ' + error.message);
                } else {
                    showSuccess('Password updated successfully!');
                    document.getElementById('passwordForm').reset();
                }
            } catch (error) {
                console.error('Error updating password:', error);
                showError('An unexpected error occurred');
            } finally {
                setLoading('passwordBtn', false);
            }
        }

        async function refreshProfile() {
            clearMessages();
            showSuccess('Refreshing profile...');
            await loadUserProfile();
            showSuccess('Profile refreshed successfully!');
        }

        async function confirmLogout() {
            if (confirm('Are you sure you want to logout?')) {
                try {
                    await AuthService.signOut();
                    window.location.href = 'auth.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = 'auth.html';
                }
            }
        }

        // Utility functions
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function setLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const originalText = button.textContent;
            
            if (isLoading) {
                button.disabled = true;
                button.textContent = 'Updating...';
            } else {
                button.disabled = false;
                button.textContent = originalText;
            }
        }
    </script>
</body>
</html>
